<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Homepage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>

        body{
            background:#e9e9e9;
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }

        .navbar{
            background:#d6d6d6;
        }

        .banner{
            background:#cfcfcf;
            height:600px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:60px;
            font-weight:300;
            margin-top:15px;
        }

        .banner img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .page-content{
            flex:1;
        }

        .category-box{
            background:#bdbdbd;
            height:200px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            margin-bottom:10px;
        }

        .category-box img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .category-scroll{
            background:#dedede;
            padding:15px;
            margin-top:20px;
        }

        .footer{
            background:#b0b0b0;
            padding:10px;
            font-size:14px;
        }

    </style>

</head>

<body>
<header class="navbar navbar-expand-md d-flex justify-content-between align-items-center border-bottom p-3" style="height: 90px">
    <section class="d-flex align-items-center gap-4">
        <a href="index.html" class="navbar-brand">LOGO</a>

        <nav>
            <ul class="nav">
                <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Men's</a></li>
                <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Women's</a></li>
                <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Unisex</a></li>
                <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Accessories</a></li>
            </ul>
        </nav>
    </section>

    <section class="d-flex gap-3 align-items-center">
        <form><input class="form-control form-control" type="search" placeholder="Search..."></form>

        <a href="profile.html"><i class="bi bi-person fs-3"></i></a>
        <a href="cart.html"><i class="bi bi-bag fs-4"></i></a>
    </section>
</header>

<div class="page-content">
    <div class="container-fluid">

        <!-- BANNER -->

        <div class="banner">
            <img src="assets/img/banner.jpg" alt="Banner">
        </div>


        <!-- CATEGORY ROW -->

        <div class="category-scroll">

            <div class="row text-center">

                <div class="col-md-3">
                    <div class="category-box">
                        <img src="assets/img/menClothing.jpg" alt="Men's">
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="category-box">
                        <img src="assets/img/womenClothing.png" alt="Women's">
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="category-box">
                        <img src="assets/img/unisex.jpg" alt="Unisex">
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="category-box">
                        <img src="assets/img/accesories.jpg" alt="Accessories">
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>



<footer class="border-top p-3">
    <div class="d-flex justify-content-between align-items-top mt-2">
        <h2 class="fw-bold fs-2">LOGO</h2>

        <section class="d-flex gap-3">
            <a href="https://instagram.com"><i class="bi bi-instagram fs-4"></i></a>
            <a href="https://threads.com"><i class="bi bi-threads fs-4"></i></a>
            <a href="https://youtube.som"><i class="bi bi-youtube fs-4"></i></a>
            <a href="https://x.com"><i class="bi bi-twitter-x fs-4"></i></a>
            <a href="https://tiktok.com"><i class="bi bi-tiktok fs-4"></i></a>
            <a href="https://pinterest.com"><i class="bi bi-pinterest fs-4"></i></a>
        </section>
    </div>
</footer>

</body>
</html>
