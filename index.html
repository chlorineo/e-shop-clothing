    <style>

        .banner{
            background:#cfcfcf;
            height:600px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:60px;
            font-weight:300;
            margin-top:15px;
        }

        .banner img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .page-content{
            flex:1;
        }

        .category-box{
            background:#bdbdbd;
            height:200px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            margin-bottom:10px;
        }

        .category-box img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .category-scroll{
            padding:15px;
            margin-top:20px;
        }

        .footer{
            background:#b0b0b0;
            padding:10px;
            font-size:14px;

            </section>
