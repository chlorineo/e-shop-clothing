<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="container-fluid">
<div class="min-vh-100">
    <header class="navbar navbar-expand-md border-bottom p-3" style="min-height: 90px">
        <div class="container-fluid">
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="navbar-toggler-icon"></i>
            </button>

            <a href="index.html" class="navbar-brand mx-auto mx-md-0 fw-bold">Styliqueo</a>

            <div class="d-md-none invisible pe-none">
                <button class="navbar-toggler border-0" type="button">
                    <i class="navbar-toggler-icon"></i>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <section class="d-flex flex-column flex-md-row gap-3 align-items-start align-items-md-center order-md-last ms-md-auto mt-4 mt-md-0">
                    <form class="w-100"><input class="form-control" type="search" placeholder="Search..."></form>
                    <div class="d-flex flex-column flex-md-row gap-3">
                        <a href="profile.html" class="text-body"><i class="bi bi-person fs-3"></i></a>
                        <a href="cart.html" class="text-body"><i class="bi bi-bag fs-4"></i></a>
                    </div>
                </section>

                <ul class="navbar-nav gap-2 gap-md-0 mt-4 mt-md-0 ms-md-4">
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Men's</a></li>
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Women's</a></li>
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Unisex</a></li>
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Accessories</a></li>
                </ul>
            </div>
        </div>
    </header>


    <main class="container-fluid my-5">
        <div class="mx-auto" style="max-width: 700px;">
            <p class="fs-4 mb-3">Add photos</p>
            <div class="d-flex gap-3 mb-5 flex-wrap">
                <div class="ratio ratio-1x1 border bg-light rounded me-1" style="width: 100px;">
                    <img src="assets/img/mens/ManDenimJacket.jpg" alt="product image" class="object-fit-contain rounded">
                </div>
                <div class="ratio ratio-1x1 border bg-light rounded me-1" style="width: 100px;">
                    <img src="assets/img/mens/ManDenimJacket2.jpg" alt="product image" class="object-fit-contain rounded">
                </div>
                <div class="ratio ratio-1x1 border bg-light rounded me-1" style="width: 100px;">
                    <img src="assets/img/mens/ManDenimJeans1.jpg" alt="product image" class="object-fit-contain rounded">
                </div>
                <div class="ratio ratio-1x1 border bg-light rounded" style="width: 100px;">
                    <button type="button" class="btn btn-outline-secondary w-100 h-100 d-flex align-items-center justify-content-center">
                        <i class="bi bi-plus fs-2"></i>
                    </button>
                </div>
            </div>

            <div class="mb-4">
                <p class="fs-4 mb-2">Product name</p>
                <input type="text" class="form-control form-control-lg py-3 fs-5" placeholder="Product name...">
            </div>

            <div class="mb-4">
                <p class="fs-4 mb-2">Product description</p>
                <textarea class="form-control form-control-lg fs-5" rows="6" placeholder="Description..."></textarea>
            </div>

            <div class="mb-4">
                <p class="fs-4 mb-2">Cost</p>
                <input type="text" class="form-control form-control-lg py-3 fs-5" placeholder="Cost...">
            </div>

            <div class="mb-5">
                <p class="fs-4 mb-2">Tags</p>
                <input type="text" class="form-control form-control-lg py-3 fs-5" placeholder="Tags...">
            </div>

            <div class="d-flex justify-content-between gap-3 mt-5">
                <a href="admin_panel.html" type="button" class="btn btn-outline-secondary btn-lg flex-grow-1 py-3 fs-4">Cancel</a>
                <a href="admin_panel.html" type="button" class="btn btn-outline-secondary btn-lg flex-grow-1 py-3 fs-4">Save</a>
            </div>
        </div>
    </main>
</div>

<footer class="border-top p-3">
    <div class="d-flex justify-content-between align-items-top mt-2">
        <h2 class="fw-bold fs-2">Styliqueo</h2>

        <section class="d-flex gap-3">
            <a href="https://instagram.com"><i class="bi bi-instagram fs-4"></i></a>
            <a href="https://threads.com"><i class="bi bi-threads fs-4"></i></a>
            <a href="https://youtube.som"><i class="bi bi-youtube fs-4"></i></a>
            <a href="https://x.com"><i class="bi bi-twitter-x fs-4"></i></a>
            <a href="https://tiktok.com"><i class="bi bi-tiktok fs-4"></i></a>
            <a href="https://pinterest.com"><i class="bi bi-pinterest fs-4"></i></a>
        </section>
    </div>
</footer>
</body>
</html>
