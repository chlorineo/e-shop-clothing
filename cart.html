<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="container-fluid">
<div class="vh-100">
    <header class="navbar navbar-expand-md d-flex justify-content-between align-items-center border-bottom p-3" style="height: 90px">
        <section class="d-flex align-items-center gap-4">
            <a href="index.html" class="navbar-brand">LOGO</a>

            <nav>
                <ul class="nav">
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Men's</a></li>
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Women's</a></li>
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Unisex</a></li>
                    <li class="nav-item"><a class="nav-link active fs-5" href="category.html">Accessories</a></li>
                </ul>
            </nav>
        </section>

        <section class="d-flex gap-3 align-items-center">
            <form><input class="form-control form-control" type="search" placeholder="Search..."></form>

            <a href="profile.html"><i class="bi bi-person fs-3"></i></a>
            <a href="cart.html"><i class="bi bi-bag fs-4"></i></a>
        </section>
    </header>

    <main class="container-fluid my-5">
        <div class="row g-5">

            <div class="col-md-7">
                <div class="mx-auto" style="max-width: 700px;">
                    <h2 class="fw-bold fs-2 mb-5">Cart</h2>

                    <div class="row g-4 mb-4 align-items-center">
                        <div class="col-4">
                            <div class="ratio ratio-1x1 bg-light border">
                                <img src="assets/img/benjamin-szabo-3azXYMg-Y8o-unsplash.jpg" alt="product" class="object-fit-contain">
                            </div>
                        </div>
                        <div class="col-8">
                            <a href="product.html" class="fs-3 fw-bold mb-1 text-decoration-none text-body">Product name</a>
                            <h4 class="fs-5 mb-3">Cost $</h4>
                            <p class="fs-6 mb-3">Size XL</p>

                            <div class="d-flex gap-2 mb-3">
                                <button class="btn btn-outline-secondary" type="button"><i class="bi bi-dash"></i></button>
                                <input type="text" class="form-control text-center" value="1" style="max-width: 60px;">
                                <button class="btn btn-outline-secondary" type="button"><i class="bi bi-plus"></i></button>
                            </div>
                            <button class="btn btn-outline-secondary w-100">Delete from cart</button>
                        </div>
                    </div>

                    <div class="row g-4 mb-4 align-items-center">
                        <div class="col-4">
                            <div class="ratio ratio-1x1 bg-light border">
                                <img src="assets/img/benjamin-szabo-3azXYMg-Y8o-unsplash.jpg" alt="product" class="object-fit-contain">
                            </div>
                        </div>
                        <div class="col-8">
                            <a href="product.html" class="fs-3 fw-bold mb-1 text-decoration-none text-body">Product name</a>
                            <h4 class="fs-5 mb-3">Cost $</h4>
                            <p class="fs-6 mb-3">Size XL</p>

                            <div class="d-flex gap-2 mb-3">
                                <button class="btn btn-outline-secondary" type="button"><i class="bi bi-dash"></i></button>
                                <input type="text" class="form-control text-center" value="1" style="max-width: 60px;">
                                <button class="btn btn-outline-secondary" type="button"><i class="bi bi-plus"></i></button>
                            </div>
                            <button class="btn btn-outline-secondary w-100">Delete from cart</button>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-5">
                        <button class="btn btn-outline-secondary w-50"><i class="bi bi-chevron-compact-left fs-4"></i></button>
                        <button class="btn btn-outline-secondary w-50"><i class="bi bi-chevron-compact-right fs-4"></i></button>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="mx-auto" style="max-width: 500px;">
                    <h2 class="fw-bold fs-2 mb-5">Order summary</h2>

                    <div class="d-flex justify-content-between mb-2">
                        <p class="fs-4 mb-0">Cost:</p>
                        <p class="fs-4 mb-0">x $</p>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <p class="fs-4 mb-0">Discount:</p>
                        <p class="fs-4 mb-0">x $</p>
                    </div>
                    <div class="d-flex justify-content-between mb-5">
                        <p class="fs-4 mb-0">Delivery:</p>
                        <p class="fs-4 mb-0">x $</p>
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <h2 class="fs-3 mb-0 fw-bold">Total cost:</h2>
                        <h2 class="fs-3 mb-0 fw-bold">x $</h2>
                    </div>
                    <div class="d-flex justify-content-between mb-5">
                        <h2 class="fs-3 mb-0 fw-bold">VAT:</h2>
                        <h2 class="fs-3 mb-0 fw-bold">x $</h2>
                    </div>

                    <section class="mt-5">
                        <div class="btn-group w-100 mb-4">
                            <input type="radio" class="btn-check" name="delivery" id="home" checked>
                            <label class="btn btn-outline-secondary" for="home">Home Delivery</label>

                            <input type="radio" class="btn-check" name="delivery" id="store">
                            <label class="btn btn-outline-secondary" for="store">Pick Up In Store</label>
                        </div>

                        <input type="text" class="form-control mb-4" placeholder="Address...">

                        <div class="btn-group w-100 mb-4">
                            <button type="button" class="btn btn-outline-secondary py-2"><i class="bi bi-google fs-2"></i></button>
                            <button type="button" class="btn btn-outline-secondary py-2"><i class="bi bi-apple fs-2"></i></button>
                            <button type="button" class="btn btn-outline-secondary py-2"><i class="bi bi-credit-card fs-2"></i></button>
                            <button type="button" class="btn btn-outline-secondary py-2"><i class="bi bi-cash-coin fs-2"></i></button>
                        </div>

                        <div class="d-grid mt-2">
                            <button type="button" class="btn btn-outline-secondary btn-lg">Checkout</button>
                        </div>
                    </section>
                </div>
            </div>

        </div>
    </main>
</div>

<footer class="border-top p-3">
    <div class="d-flex justify-content-between align-items-top mt-2">
        <h2 class="fw-bold fs-2">LOGO</h2>

        <section class="d-flex gap-3">
            <a href="https://instagram.com"><i class="bi bi-instagram fs-4"></i></a>
            <a href="https://threads.com"><i class="bi bi-threads fs-4"></i></a>
            <a href="https://youtube.som"><i class="bi bi-youtube fs-4"></i></a>
            <a href="https://x.com"><i class="bi bi-twitter-x fs-4"></i></a>
            <a href="https://tiktok.com"><i class="bi bi-tiktok fs-4"></i></a>
            <a href="https://pinterest.com"><i class="bi bi-pinterest fs-4"></i></a>
        </section>
    </div>
</footer>
</body>
</html>
